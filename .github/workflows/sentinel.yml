name: Project Sentinel CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  sentinel:
    name: "Sentinel Eval Suite"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run Sentinel eval suite
        run: python -m pytest tests/ -v --tb=short

      - name: Generate Sentinel report
        if: always()
        run: python tests/sentinel_runner.py --json > sentinel-report.json

      - name: Upload Sentinel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-report-py${{ matrix.python-version }}
          path: sentinel-report.json
